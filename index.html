<!DOCTYPE html>
<html lang="en" data-theme="evo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlowFrame | Intentional Viewing</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* --- 1. THEME VARIABLES --- */
        :root {
            --bg-color: #F4F1EA;
            --chassis-color: #E8E4DC;
            --accent-color: #8B7355;
            --text-color: #4A4036;
            --shadow-light: #FFFFFF;
            --shadow-dark: #C8C4BC;
            --frame-color: #FFFFFF;
        }

        [data-theme="pink"] {
            --bg-color: #FDF2F5;
            --chassis-color: #F8E1E7;
            --accent-color: #D48C9A;
            --text-color: #7A4A52;
            --shadow-light: #FFF0F5;
            --shadow-dark: #E0C0C8;
        }

        [data-theme="blue"] {
            --bg-color: #F0F7F9;
            --chassis-color: #DCEEF2;
            --accent-color: #7BA7BC;
            --text-color: #4A6572;
            --shadow-light: #FFFFFF;
            --shadow-dark: #B8D4DC;
        }

        [data-theme="floral"] {
            --bg-color: #F5F7F0;
            --chassis-color: #E4EAD9;
            --accent-color: #8FA687;
            --text-color: #4A5D44;
            --shadow-light: #FFFFFF;
            --shadow-dark: #C8D0C0;
        }

        /* --- 2. BASE STYLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Playfair Display', serif;            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.6s ease, color 0.6s ease;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }

        /* --- 3. THE CHASSIS (Main Container) --- */
        .camera-body {
            background-color: var(--chassis-color);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 
                20px 20px 60px var(--shadow-dark), 
                -20px -20px 60px var(--shadow-light);
            width: 90%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            transition: background-color 0.6s ease, box-shadow 0.6s ease;
            position: relative;
        }

        /* --- 4. THE LENS RING (Theme Selector) --- */
        .lens-assembly {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--shadow-light), var(--shadow-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 
                8px 8px 16px var(--shadow-dark), 
                -8px -8px 16px var(--shadow-light);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .lens-assembly:active { transform: scale(0.98); }
        .lens-inner {
            width: 120px;
            height: 120px;
            border-radius: 50%;            background-color: var(--bg-color);
            border: 4px solid var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            color: var(--text-color);
            transition: all 0.6s ease;
        }
        .lens-label {
            position: absolute;
            top: -30px;
            font-family: 'Courier Prime', monospace;
            font-size: 0.75rem;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* --- 5. THE POLAROID PLAYER --- */
        .polaroid-frame {
            background-color: var(--frame-color);
            padding: 12px 12px 40px 12px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            transform: rotate(-1deg);
            transition: transform 0.4s ease;
        }
        .polaroid-frame:hover { transform: rotate(0deg) scale(1.02); }
        .video-placeholder {
            width: 100%;
            aspect-ratio: 4/5;
            background-color: #2a2a2a;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Courier Prime', monospace;
            font-size: 0.8rem;
            position: relative;
            overflow: hidden;
        }
        .video-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;        }
        .date-stamp {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-family: 'Courier Prime', monospace;
            color: #FF9900;
            font-size: 0.85rem;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .video-caption {
            margin-top: 15px;
            font-family: 'Courier Prime', monospace;
            font-size: 0.85rem;
            color: #555;
            text-align: center;
            font-style: italic;
        }

        /* --- 6. THE FILM LEVER (Timer) --- */
        .controls-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }
        .lever-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .lever-label {
            font-family: 'Courier Prime', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Custom Range Slider to look like a mechanical lever */
        input[type=range] {
            -webkit-appearance: none;
            width: 100px;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 2px 2px 5px var(--shadow-dark), -2px -2px 5px var(--shadow-light);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--shadow-dark);
            border-radius: 2px;
        }

        /* --- 7. THE SHUTTER BUTTON --- */
        .shutter-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, var(--shadow-light), var(--shadow-dark));
            box-shadow: 
                6px 6px 12px var(--shadow-dark), 
                -6px -6px 12px var(--shadow-light);
            cursor: pointer;
            position: relative;
            transition: all 0.1s ease;
        }
        .shutter-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--accent-color);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
            transition: background-color 0.6s ease;
        }
        .shutter-btn:active {
            box-shadow: 
                inset 4px 4px 8px var(--shadow-dark), 
                inset -4px -4px 8px var(--shadow-light);
        }
        .shutter-btn:active::after {
            transform: translate(-50%, -50%) scale(0.95);
        }
        /* --- 8. SOFT STOP OVERLAY --- */
        .soft-stop {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-color);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
            z-index: 10;
        }
        .soft-stop.active {
            opacity: 1;
            pointer-events: all;
        }
        .soft-stop h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--accent-color);
        }
        .soft-stop p {
            font-family: 'Courier Prime', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
        }

    </style>
</head>
<body>

    <div class="camera-body">
        <!-- Soft Stop Overlay -->
        <div class="soft-stop" id="softStop">
            <h2>Time to rest 🌸</h2>
            <p>You've reached your gentle limit.<br>Put the screen down, stretch your back,<br>and enjoy the real world.</p>
        </div>

        <div class="lens-label">MOOD LENS</div>
        <div class="lens-assembly" id="lensRing" onclick="cycleTheme()">
            <div class="lens-inner" id="themeName">Instax<br>Classic</div>
        </div>

        <div class="polaroid-frame" id="videoFrame">
            <div class="video-placeholder">                <!-- Replace with actual <video> or <iframe> tag -->
                <span>[ Wholesome Video Loading... ]</span>
                <div class="date-stamp" id="dateStamp">2026 06 17</div>
            </div>
            <div class="video-caption" id="videoCaption">A quiet morning in Strasbourg ☕</div>
        </div>

        <div class="controls-row">
            <div class="lever-container">
                <span class="lever-label">Time Limit</span>
                <input type="range" id="timeLever" min="1" max="3" value="1" step="1">
                <span class="lever-label" id="timeDisplay">5 Mins</span>
            </div>
            
            <button class="shutter-btn" id="shutterBtn" onclick="loadNextVideo()" aria-label="Load next video"></button>
        </div>
    </div>

    <script>
        // --- 1. THEME CYCLING LOGIC ---
        const themes = [
            { id: 'evo', name: 'Instax<br>Classic' },
            { id: 'pink', name: 'Coquette<br>Pink' },
            { id: 'blue', name: 'Beachy<br>Blue' },
            { id: 'floral', name: 'Floral<br>Garden' }
        ];
        let currentThemeIndex = 0;

        function cycleTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const newTheme = themes[currentThemeIndex];
            document.documentElement.setAttribute('data-theme', newTheme.id);
            document.getElementById('themeName').innerHTML = newTheme.name;
            
            // Add a subtle rotation animation to the lens
            const lens = document.getElementById('lensRing');
            lens.style.transform = `rotate(${currentThemeIndex * 90}deg)`;
        }

        // --- 2. TIME LEVER LOGIC ---
        const timeLever = document.getElementById('timeLever');
        const timeDisplay = document.getElementById('timeDisplay');
        const timeMap = { 1: '5 Mins', 2: '10 Mins', 3: '15 Mins' };
        let sessionTimer;

        timeLever.addEventListener('input', (e) => {
            const val = e.target.value;
            timeDisplay.textContent = timeMap[val];
            resetTimer(val);
        });
        function resetTimer(val) {
            clearTimeout(sessionTimer);
            document.getElementById('softStop').classList.remove('active');
            const minutes = parseInt(val) * 5;
            sessionTimer = setTimeout(() => {
                document.getElementById('softStop').classList.add('active');
            }, minutes * 60 * 1000); // Set timer (for testing, you can change this to seconds)
        }

        // --- 3. SHUTTER / VIDEO LOGIC ---
        const wholesomeVideos = [
            { caption: "A quiet morning in Strasbourg ☕", img: "https://images.unsplash.com/photo-1599940778173-e276d4acb2bd?w=400&q=80" },
            { caption: "Gentle seated stretches for your back 🧘‍♀️", img: "https://images.unsplash.com/photo-1544367563-12123d8965cd?w=400&q=80" },
            { caption: "Packing a 40x20cm suitcase neatly 🧳", img: "https://images.unsplash.com/photo-1553531384-cc64ac80f931?w=400&q=80" },
            { caption: "Soft pastel room decor inspiration 🎀", img: "https://images.unsplash.com/photo-1598928506311-c55ded91a20c?w=400&q=80" }
        ];
        let videoIndex = 0;

        function loadNextVideo() {
            // Simulate "developing" a new photo
            const frame = document.getElementById('videoFrame');
            frame.style.opacity = '0';
            frame.style.transform = 'rotate(2deg) scale(0.95)';
            
            setTimeout(() => {
                videoIndex = (videoIndex + 1) % wholesomeVideos.length;
                const vid = wholesomeVideos[videoIndex];
                
                // Update content (In a real app, this would swap the video src)
                document.getElementById('videoCaption').textContent = vid.caption;
                document.querySelector('.video-placeholder span').textContent = "[ Playing: " + vid.caption + " ]";
                document.querySelector('.video-placeholder').style.backgroundImage = `url(${vid.img})`;
                document.querySelector('.video-placeholder').style.backgroundSize = 'cover';
                
                // Update date stamp to today
                const today = new Date();
                const dateStr = `${today.getFullYear()} ${String(today.getMonth()+1).padStart(2,'0')} ${String(today.getDate()).padStart(2,'0')}`;
                document.getElementById('dateStamp').textContent = dateStr;

                // Bring it back
                frame.style.opacity = '1';
                frame.style.transform = 'rotate(-1deg) scale(1)';
            }, 400);
        }

        // Initialize
        resetTimer(1);
    </script>
</body></html>
